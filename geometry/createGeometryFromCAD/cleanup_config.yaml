# Cleanup input/output directories.
# Batch mode:
#   `in_root`  -> root containing many `slice_*` raw directories
#   `out_root` -> root where matching cleaned `slice_*` directories are written
#   `slice_glob` -> which input slice directories to process
# Single-slice mode is also supported via `in_dir` + `out_dir`, but is omitted here.


# TODO:
# Need some logic to generate wall components on slies where faulty wall components are not properly generated
# This affects slices 32.5, and 67.5  (did it affect 52.50?), could do a flat substitution regex for all wall components 
# Good PMT slice on 52.50, 112.5 (this is a very nice slice in general)


paths:
  in_root: "/work/geometry/createGeometryFromCAD/DXF_slices_parts"
  out_root: "/work/geometry/createGeometryFromCAD/DXF_slices_cleaned"
  slice_glob: "slice_*"

# Scale applied only to slice-derived JSONs as they are loaded.
# Current slices are in mm on disk, so use 0.001 to convert them to m.
slice_input_scale: 0.001

# Fixed y-offset applied to slice-derived JSONs after scaling.
# This is ignored when `slice_alignment.reference_component` is set below.
slice_offset_y: 0.0

# Fixed y-offset applied to manual additions only.
manual_offset_y: 0.0 #0.0011575013

# Cleanup tolerances, both in meters after scaling.
# `shape_match_tol` controls "are these the same shape?"
# `periodicity_tol` controls "are these evenly spaced repeats?"
shape_match_tol: 1.0e-6
periodicity_tol: 1.0e-4

# Grouping mode:
#   `none`     -> do not group anything; only apply ignore/replacement/manual steps
#   `periodic` -> enable periodic grouping and legacy override_periodicity handling
#    NOTE: periodic does not work and looses components, not worth fixing as the 
#    move to a different serialization scheme is imminent
grouping_mode: none

# Optional runtime alignment of all slice-derived geometry.
# The generated slice Python computes a y-shift so that the top of
# `reference_component` lands on `reference_top_y`.
# `reference_top_y` is evaluated in the generated Python and may use `liquid_level`.
# Optional:
#   slices:
#     - "^slice_022\\.50deg$"
slice_alignment:
  reference_component: "XENTTPCDNewAnodeXENTTPCDLWarmPart4665Part4665_1"
  reference_top_y: "-liquid_level"
  default_liquid_level: 0.004

# Remove stale JSONs from `out_dir` that were not produced by the current run.
prune_stale_outputs: true

# Drop components by regex before any replacements or grouping.
# Each rule may optionally include:
#   slices:
#     - "^slice_022\\.50deg$"
ignore_components:
  - match: "^XENTTPCFPart5521Part5521_.*$"
    slices:
      - "^slice_022\\.50deg$"
  - match: "^XENTTPCAWarmPart1125Part1125_0$"
