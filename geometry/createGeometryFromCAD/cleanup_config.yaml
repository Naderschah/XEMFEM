# Selector-only component groups for downstream geometry logic.
# PTFEWall should list the pre-partition source components that make up the
# wall. The mesh build then finds the matching partition faces and keeps only
# the vertical inner-wall edges, i.e. the ones closest to x = 0.
selectors:
  PTFEWall:
    components:
      - ^XENTTPCAWarmPart088Part088_\d{1,2}$

# Manual additions copied into `out_dir`.
# Each rule supports:
#   from: "/path/to/file.json"
#   from_glob: "/path/to/*.json"
#   to_name: "override_output_stem"
#   to_dir: "/alternate/output/dir"
#   offset_y: 0.0
manual_additions:
  copy:
    - from: "manual_overwrites/SR3_extracted/GateWires/definition.json"
      to_name: "GateWires"
    - from: "manual_overwrites/SR3_extracted/AnodeWires/definition.json"
      to_name: "AnodeWires"
    - from: "manual_overwrites/SR3_extracted/CathodeWires/definition.json"
      to_name: "CathodeWires"
    - from: "manual_overwrites/SR3_extracted/LXe/default_liquid_level_0.004.json"
      to_name: "LXe"
    - from: "manual_overwrites/SR3_extracted/GXe/default_liquid_level_0.004.json"
      to_name: "GXe"

