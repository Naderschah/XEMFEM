# Explicit replacements applied before grouping.
# Use `target` for one bad component or `targets` for several fragments.
# `source` may be:
#   - another component stem in the same slice
#   - a path-based source:
#       source:
#         path: "/abs/path/to/fix.json"
# Optional:
#   output_name: "replacement_stem"
#   replace_index_with_line: 8
#   replace_indices_with_lines: [8, 11]
#   slices:
#     - "^slice_022\\.50deg$"
replacements:
  - targets:
      - "XENTTPCAWarmPart088Part088_69"
      - "XENTTPCAWarmPart088Part088_72"
    output_name: "XENTTPCAWarmPart088Part088_69"
    source: "XENTTPCAWarmPart088Part088_55"
    slices:
      - "^slice_022\\.50deg$"
  - targets:
      - "XENTTPCAWarmPart087Part087_72"
      - "XENTTPCAWarmPart087Part087_74"
    output_name: "XENTTPCAWarmPart087Part087_72"
    source: "XENTTPCAWarmPart087Part087_70"
    slices:
      - "^slice_037\\.50deg$"
  - target: "XENTTPCDNewAnodePart4794Part4794_1"
    replace_index_with_line: 8
    slices:
      - "^slice_022\\.50deg$"


# Material classification for the generated slice Python.
# Supported top-level materials are: GXe, LXe, PTFE
# Optional per-entry fields:
#   default: true
#   slices:
#     - "^slice_022\\.50deg$"
materials:
  GXe:
    components:
      - "GXe"
  LXe:
    components:
      - "LXe"
  PTFE:
    default: true

